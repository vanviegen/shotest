}
.test-item {
  padding: 8px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}
.test-item:hover { background: var(--bg3); }
.test-item.selected { background: var(--accent); color: white; }
.test-item.selected .title { color: white; }
.test-item.selected .title.failed { color: #ffe6e6; }
.test-item .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.test-item .dot.orange { background: var(--orange); }
.test-item .dot.green { background: var(--green); }
.test-item .dot.neutral { background: var(--fg2); }
.test-item .title {
  flex: 1;
  min-width: 0;
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.test-item .title.failed { color: var(--red); font-weight: 600; }

/* Right panel: test detail */
#test-detail {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
#test-detail.empty {
  align-items: center;
  justify-content: center;
  color: var(--fg2);
  font-size: 16px;
}

/* Steps grid */
.steps-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
}
.step {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px;
}
.step.changed { border-color: var(--yellow); }
.step.new { border-color: var(--green); }
.step.removed { border-color: var(--red); }
.step .images {
  display: flex;
  gap: 4px;
}
.step img {
  border-radius: 3px;
  background: #000;
}
.step .label {
  font-size: 11px;
  color: var(--fg2);
  margin-top: 4px;
  text-align: center;
}
.step .img-label {
  font-size: 10px;
  color: var(--fg2);
  text-align: center;
}

/* Error box */
.error-box {
  background: rgba(244, 71, 71, 0.1);
  border: 1px solid var(--red);
  border-radius: 6px;
  padding: 12px 16px;
  font-size: 13px;
  font-family: monospace;
  white-space: pre-wrap;
  word-break: break-all;
  color: var(--red);
  max-height: 200px;
  overflow-y: auto;
}

/* Accept button */
.accept-btn {
  background: var(--green);
  color: white;
  border: none;
  padding: 10px 24px;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  font-weight: 600;
  align-self: flex-start;
}
.accept-btn:hover { filter: brightness(1.15); }</style>
</head>
<body>
<div id="test-list"></div>
<div id="test-detail" class="empty"></div>
</body>
</html>
